# Docker Compose — AI Software Engineer
#
# Orchestrates all infrastructure and application services.
# Run: docker compose up -d

services:
  # ── Graph Database ─────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: ase-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Vector Database ────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: ase-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Task Queue ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ase-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend API ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: ase-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

  # ── Background Worker ──────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: ase-worker
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

  # ── Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: ase-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    profiles:
      - full

volumes:
  neo4j_data:
  neo4j_logs:
  chroma_data:
  redis_data:
