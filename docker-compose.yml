# CodeIntel full stack — run with:
#   docker compose up --build
#
# Copy .env.example to .env and set API keys before first run.

services:
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ragnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  neo4j:
    image: neo4j:5.23
    container_name: rag_neo4j
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - ragnet
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: rag_chromadb
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - ragnet
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: rag_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      CHROMA_USE_HTTP: "true"
      REDIS_URL: redis://redis:6379/0
      INGESTION_USE_WORKER: "true"
      INGESTION_WORKSPACE_DIR: /app/data/ingestion
      CORS_ORIGINS: '["http://localhost:5173","http://localhost"]'
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - ragnet

  worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: rag_worker
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      CHROMA_USE_HTTP: "true"
      REDIS_URL: redis://redis:6379/0
      INGESTION_USE_WORKER: "true"
      INGESTION_WORKSPACE_DIR: /app/data/ingestion
    volumes:
      - app_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - ragnet
    healthcheck:
      test: ["CMD", "python", "-m", "app.worker.healthcheck"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    container_name: rag_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ragnet

volumes:
  redis_data:
  neo4j_data:
  neo4j_logs:
  chroma_data:
  app_data:

networks:
  ragnet:
    driver: bridge
